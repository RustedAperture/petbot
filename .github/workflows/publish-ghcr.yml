name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "Dockerfile"
      - "src/**"
      - "apps/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build-bot:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    concurrency:
      group: publish-ghcr-${{ github.ref }}-bot
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT || secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta-bot
        uses: docker/metadata-action@v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}-bot
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=semver,pattern=v?(.+)

      - name: Build and push — bot (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: bot
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-bot.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    concurrency:
      group: publish-ghcr-${{ github.ref }}-web
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Set up Node.js (for apps/web dependency install)
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies (apps/web)
        run: npm ci --prefix apps/web --no-audit --no-fund

      - name: Restore Next.js build cache
        uses: actions/cache@v5.0.3
        with:
          path: apps/web/.next
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'apps/web/package-lock.json', 'apps/web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Prebuild frontend (apps/web)
        run: npm --prefix apps/web run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT || secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta-web
        uses: docker/metadata-action@v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}-web
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=semver,pattern=v?(.+)

      - name: Build and push — web (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    needs: [build-bot, build-web]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Extract release notes from changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Read changelog.md and extract the section for the current tag
          RELEASE_NOTES=$(awk -v tag="## ${TAG}" '
            index($0, tag) == 1 { found=1; next }
            found && /^## / { exit }
            found { print }
          ' changelog.md)

          if [ -z "$RELEASE_NOTES" ]; then
            echo "No release notes found for ${TAG} in changelog.md"
            RELEASE_NOTES="No release notes available."
          fi

          # Write to output file for the next step
          echo "$RELEASE_NOTES" > release-notes.txt
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          cat release-notes.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/github-script@v8.0.0
        with:
          script: |
            const body = process.env.RELEASE_NOTES || 'No release notes available.';
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: process.env.GITHUB_REF_NAME,
                name: process.env.GITHUB_REF_NAME,
                body: body,
                draft: false,
                prerelease: false,
              });
            } catch (err) {
              core.warning(`Failed to create release: ${err}`);
            }
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}

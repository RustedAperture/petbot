name: "Close linked issues on PR merge"

# When a pull request is merged, GitHub normally auto-closes issues
# only when the merge commit reaches the default branch and contains
# a closing keyword (`Fixes #123`, etc). In our workflow we often merge
# feature/issue branches into an intermediate `release` branch and only
# later merge releases into `main`. The final merge commit doesn't retain
# the original keywords, so the issue stays open.
#
# This workflow listens for *any* pull request that is closed and
# merged and explicitly closes any issue numbers mentioned in the PR
# description or title. It runs regardless of the target branch, so
# closing during a release merge still triggers it.

on:
  pull_request:
    types: [closed]

jobs:
  close-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Close referenced issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            // gather issue numbers from title/body keywords
            const text = `${pr.title}\n${pr.body || ''}`;
            const fromText = [...text.matchAll(/#(\d+)/g)].map(m => Number(m[1]));

            // fetch linked/associated issues via GraphQL (covers sidebar links, cross‑refs, etc.)
            const query = `
              query($owner:String!, $repo:String!, $number:Int!) {
                repository(owner:$owner, name:$repo) {
                  pullRequest(number:$number) {
                    closingIssuesReferences(first: 20) {
                      nodes { number }
                    }
                    timelineItems(first: 50, itemTypes: [CONNECTED_EVENT, CROSS_REFERENCED_EVENT]) {
                      nodes {
                        __typename
                        ... on ConnectedEvent {
                          subject {
                            __typename
                            ... on Issue { number }
                          }
                        }
                        ... on CrossReferencedEvent {
                          source {
                            __typename
                            ... on Issue { number }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;
            const { repository } = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: pr.number,
            });

            const fromGraph = [];
            const prInfo = repository.pullRequest;
            if (prInfo) {
              if (prInfo.closingIssuesReferences) {
                fromGraph.push(...prInfo.closingIssuesReferences.nodes.map(i => i.number));
              }
              if (prInfo.timelineItems) {
                for (const node of prInfo.timelineItems.nodes) {
                  if (node.__typename === 'ConnectedEvent' && node.subject && node.subject.__typename === 'Issue') {
                    fromGraph.push(node.subject.number);
                  } else if (node.__typename === 'CrossReferencedEvent' && node.source && node.source.__typename === 'Issue') {
                    fromGraph.push(node.source.number);
                  }
                }
              }
            }

            const issueNums = Array.from(new Set([...fromText, ...fromGraph]));

            if (issueNums.length === 0) {
              core.info('no issue numbers detected');
              return;
            }

            core.info(`closing issues: ${issueNums.join(', ')}`);
            for (const num of issueNums) {
              try {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  state: 'closed',
                });
                core.info(`closed #${num}`);
              } catch (err) {
                core.warning(`failed to close #${num}: ${err}`);
              }
            }
